syntax = "proto3";

package example;

import "serialrpc.proto";

message SumRequest {
    int32 left = 1;
    int32 right = 2;
}

message SumResponse {
    int32 answer = 1;
}

message SumEventsRequest {
    int32 v = 1;
}

message SumEvent {
    int32 event = 1;
}

message Message2 {
    SumRequest sum_request = 1;
    bytes data = 2 [(bytes_size) = 8];
}

message ExampleEvent {}

service SumService {
    option (uuid) = "4f90fb19-7b58-4755-bb1f-3c81dc0a6d4d";

    rpc sum(SumRequest) returns (SumResponse) { option (method_id) = 1; }

    rpc sum_events(SumEventsRequest) returns (stream SumEvent) { option(method_id) = 2; }
}

message CANFrame {
    uint32 frame_id = 1;
    bytes  data = 2 [(bytes_size) = 8];
}

service CANService {
    option (uuid) = "9ef75f02-0a49-49b8-b4b6-7bfb8ad046d9";

    rpc send(CANFrame) returns (Nothing) { option (method_id) = 1; }
}

service ExampleService {
    option (uuid) = "a569fb0d-8929-4475-bd83-3dd372078657";

    rpc say_hello(Nothing) returns (Nothing) { option (method_id) = 1; }
    
    rpc example_event1(Nothing) returns (stream Nothing) { option (method_id) = 2; }
    rpc example_event2(Nothing) returns (stream ExampleEvent) { option (method_id) = 2; }
    rpc example_event3(ExampleEvent) returns (stream Nothing) { option (method_id) = 2; }
}
